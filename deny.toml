# cargo-deny configuration.
# License + advisory + duplicates + sources policy.
# Enforced in CI (release.yml) and locally via `just audit`.

[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# RUSTSEC-2025-0068: serde_yml is unsound (a crafted input to Serializer.emitter
# can segfault) and unmaintained (project archived). okf-pack parses/serializes
# TRUSTED LOCAL knowledge files, not adversarial input, so the practical risk is
# low. TODO(follow-up): migrate to serde_norway (maintained serde_yaml fork) and
# drop this ignore.
ignore = ["RUSTSEC-2025-0068"]

[licenses]
# Permissive licenses we accept without case-by-case review.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "CC0-1.0",
    "0BSD",
    "Zlib",
]
confidence-threshold = 0.93
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
